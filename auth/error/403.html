<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script type="text/javascript">
  $(document).ready(function() {
      const supportedLocales = ["en", "fr"];
      const translations = {
          "en": {
              "title": `
                    Access denied
              `,
              "lead": `
                Access to this file is blocked for security reasons. Do not try to bypass this security or rummage through the server files. <br/>
              `
          },
          "fr": {
              "title": `
                  Accès interdit
              `,
              "lead": `
                L'accès à ce fichier est bloqué pour des raisons de sécurité. N'essayez pas de contourner cette sécurité ou de fouiller dans les fichiers du serveur. <br/>
              `
          },
      };
      function browserLocales(languageCodeOnly = false) {
          return navigator.languages.map((locale) =>
              languageCodeOnly ? locale.split("-")[0] : locale,
          );
      }
      function isSupported(locale) {
          return supportedLocales.indexOf(locale) > -1;
      }
      function supportedOrDefault(locales) {
          return locales.find(isSupported) || 'en';
      }
      const locale = supportedOrDefault(browserLocales(true));

      document.querySelectorAll("[data-i18n-key]").forEach(function(element) {
              const key = element.getAttribute("data-i18n-key");
              const translation = translations[locale][key];
              element.innerHTML = translation;
          }
      );
    });
  </script>
